version: '3.8'

services:
  backend:
    build: ./backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=4000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - FRONTEND_URL=https://matteosalvatore.pe
      - CULQI_PUBLIC_KEY=${CULQI_PUBLIC_KEY}
      - CULQI_SECRET_KEY=${CULQI_SECRET_KEY}
      - CULQI_RSA_ID=${CULQI_RSA_ID}
      - CULQI_RSA_PUBLIC_KEY=${CULQI_RSA_PUBLIC_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://matteosalvatore.pe/api
        NEXT_PUBLIC_CULQI_PUBLIC_KEY: ${CULQI_PUBLIC_KEY}
        NEXT_PUBLIC_CULQI_RSA_ID: ${CULQI_RSA_ID:-8da6c91b-2966-46fd-9660-2f77b232e487}
        NEXT_PUBLIC_CULQI_RSA_PUBLIC_KEY: ${CULQI_RSA_PUBLIC_KEY}
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    restart: always
    ports:
      - "8010:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://matteosalvatore.pe/api
      - NEXT_PUBLIC_CULQI_PUBLIC_KEY=${CULQI_PUBLIC_KEY}
      - NEXT_PUBLIC_CULQI_RSA_ID=${CULQI_RSA_ID:-8da6c91b-2966-46fd-9660-2f77b232e487}
      - NEXT_PUBLIC_CULQI_RSA_PUBLIC_KEY=${CULQI_RSA_PUBLIC_KEY}
      - INTERNAL_API_URL=http://backend:4000/api
